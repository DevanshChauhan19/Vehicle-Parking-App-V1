{% extends "base.html" %}
{% block content %}
<h2>Add Parking Lot</h2>
<form method="POST">
    <div class="mb-3">
        <label>Name</label>
        <input type="text" name="name" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Address</label>
        <input type="text" name="address" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Pincode</label>
        <input type="text" name="pin_code" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Price per Unit Time</label>
        <input type="number" name="price" step="0.01" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Max Parking Spots</label>
        <input type="number" name="max_spots" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-success">Create Lot</button>
</form>
{% endblock %}
